<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition & Registration System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <script>
        // Inline script to prevent theme flash on load
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
        })();
    </script>
</head>
<body>

    <!-- Header Navigation -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="bi bi-shield-lock-fill me-2"></i>FaceShield AI
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item me-2">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{{ url_for('index') }}">
                            <i class="bi bi-speedometer2 me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item me-2">
                        <a class="nav-link {% if request.path == '/register' %}active{% endif %}" href="{{ url_for('register_page') }}">
                            <i class="bi bi-person-plus-fill me-1"></i>Register
                        </a>
                    </li>
                    <li class="nav-item me-2">
                        <a class="nav-link {% if request.path == '/recognize' %}active{% endif %}" href="{{ url_for('recognize_page') }}">
                            <i class="bi bi-eye-fill me-1"></i>Recognize
                        </a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link {% if request.path == '/users' %}active{% endif %}" href="{{ url_for('users_page') }}">
                            <i class="bi bi-people-fill me-1"></i>Registered Users
                        </a>
                    </li>
                    <li class="nav-item mt-2 mt-lg-0">
                        <button class="theme-toggle-btn p-1" id="themeToggle" aria-label="Toggle Theme">
                            <i class="bi bi-sun-fill" id="themeIcon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="container my-5 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Notifications Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast glass-panel" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header border-bottom border-secondary bg-transparent">
                <i class="bi bi-info-circle-fill text-primary me-2" id="toastIcon"></i>
                <strong class="me-auto text-light" id="toastTitle">System Notification</strong>
                <small class="text-muted">Just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                Notification message goes here.
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 FaceShield AI. Powered by InsightFace. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle (with Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Theme Logic & Global Helpers -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggleBtn = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const htmlTag = document.documentElement;

            // Update icon on page load based on current state
            function updateIcon(theme) {
                if (theme === 'dark') {
                    themeIcon.className = 'bi bi-sun-fill';
                } else {
                    themeIcon.className = 'bi bi-moon-fill';
                }
            }

            const currentTheme = htmlTag.getAttribute('data-bs-theme');
            updateIcon(currentTheme);

            themeToggleBtn.addEventListener('click', () => {
                const newTheme = htmlTag.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
                htmlTag.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateIcon(newTheme);
            });
        });

        // Global Toast Notification Helper
        function showToast(message, type = 'primary', title = 'System Notification') {
            const toastEl = document.getElementById('liveToast');
            const toastMessage = document.getElementById('toastMessage');
            const toastTitle = document.getElementById('toastTitle');
            const toastIcon = document.getElementById('toastIcon');

            // Configure style based on type
            toastMessage.textContent = message;
            toastTitle.textContent = title;

            // Reset text colors
            toastTitle.className = "me-auto";
            toastIcon.className = "bi me-2";

            if (type === 'success') {
                toastTitle.classList.add('text-success');
                toastIcon.classList.add('bi-check-circle-fill', 'text-success');
            } else if (type === 'danger') {
                toastTitle.classList.add('text-danger');
                toastIcon.classList.add('bi-exclamation-triangle-fill', 'text-danger');
            } else if (type === 'warning') {
                toastTitle.classList.add('text-warning');
                toastIcon.classList.add('bi-exclamation-circle-fill', 'text-warning');
            } else {
                toastTitle.classList.add('text-primary');
                toastIcon.classList.add('bi-info-circle-fill', 'text-primary');
            }

            const toast = new bootstrap.Toast(toastEl, { delay: 4000 });
            toast.show();
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
